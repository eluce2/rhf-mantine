name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # Required for OIDC (npm Trusted Publishing)
  contents: read # Required for actions/checkout

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Trusted publishing requires Node 22.14+ and npm 11.5.1+
        node-version: [24]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: pnpm install

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          # Publish uses npm Trusted Publishing (OIDC); no NPM_TOKEN needed. Ensure Trusted Publisher on npmjs.com matches workflow filename: release.yml
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
